<svg width="100%" viewBox="0 0 690 210" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">KASHAN neon blue italic text</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The word KASHAN rendered in bold italic outline letters with a neon blue double-stroke effect on a dark background</desc>

<rect width="680" height="200" fill="#080818" rx="8" style="fill:rgb(8, 8, 24);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Outer glow layer -->
<text x="340" y="155" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="118" text-anchor="middle" letter-spacing="6" fill="none" stroke="#001166" stroke-width="12" transform="skewX(-10)" style="fill:none;stroke:rgb(0, 17, 102);color:rgb(255, 255, 255);stroke-width:12px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Impact, sans-serif;font-size:118px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">KASHAN</text>

<!-- Mid blue layer -->
<text x="340" y="155" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="118" text-anchor="middle" letter-spacing="6" fill="none" stroke="#1155ee" stroke-width="5" transform="skewX(-10)" style="fill:none;stroke:rgb(17, 85, 238);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Impact, sans-serif;font-size:118px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">KASHAN</text>

<!-- Bright inner stroke -->
<text x="340" y="155" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="118" text-anchor="middle" letter-spacing="6" fill="none" stroke="#4488ff" stroke-width="2" transform="skewX(-10)" style="fill:none;stroke:rgb(68, 136, 255);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Impact, sans-serif;font-size:118px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">KASHAN</text>

<!-- Thin highlight -->
<text x="340" y="155" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="118" text-anchor="middle" letter-spacing="6" fill="none" stroke="#99bbff" stroke-width="0.8" transform="skewX(-10)" style="fill:none;stroke:rgb(153, 187, 255);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, Impact, sans-serif;font-size:118px;font-weight:900;font-style:italic;text-anchor:middle;dominant-baseline:auto">KASHAN</text>
</svg>